name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: What's the use case?
      description: What are you trying to do, and how would this help?
  - type: checkboxes
    id: principles
    attributes:
      label: Fits the project
      options:
        - label: This keeps everything local (no cloud, no telemetry, no accounts).
